<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #38bdf8;
    }

    p.subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    input {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      width: 220px;
    }

    input::placeholder { color: #64748b; }

    button {
      padding: 0.75rem 1.5rem;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #7dd3fc; }

    .history {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
      min-height: 32px;
    }

    .history-chip {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-chip:hover {
      background: #334155;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
      display: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .card h2 {
      font-size: 1.5rem;
      color: #38bdf8;
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-active { background: #166534; color: #4ade80; }
    .badge-scheduled { background: #713f12; color: #facc15; }
    .badge-landed { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .badge-cancelled { background: #7f1d1d; color: #f87171; }

    .section {
      background: #0f172a;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .airport {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .time {
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .delay {
      display: inline-block;
      margin-top: 0.25rem;
      font-size: 0.8rem;
      color: #f87171;
      background: #7f1d1d;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
    }

    .no-delay {
      display: inline-block;
      margin-top: 0.25rem;
      font-size: 0.8rem;
      color: #4ade80;
      background: #166534;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
    }

    .error {
      color: #f87171;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      display: none;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    .loading {
      color: #94a3b8;
      display: none;
      margin-bottom: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <h1>✈️ Flight Tracker</h1>
  <p class="subtitle">Search any flight by IATA code</p>

  <div class="search-box">
    <input type="text" id="flightInput" placeholder="e.g. AA100" />
    <button onclick="searchFlight()">Search</button>
  </div>

  <div class="history" id="history"></div>

  <p class="loading" id="loading">
    <span class="spinner"></span> Fetching flight data...
  </p>
  <p class="error" id="error"></p>

  <div class="card" id="card">
    <div class="card-header">
      <h2 id="flightNumber"></h2>
      <span class="badge" id="statusBadge"></span>
    </div>

    <div class="section">
      <div class="section-title">Departure</div>
      <div class="airport" id="departure"></div>
      <div class="time" id="departureTime"></div>
      <span id="departureDelay"></span>
    </div>

    <div class="section">
      <div class="section-title">Arrival</div>
      <div class="airport" id="arrival"></div>
      <div class="time" id="arrivalTime"></div>
      <span id="arrivalDelay"></span>
    </div>
  </div>

  <script>
    let history = [];

    function formatTime(iso) {
      if (!iso || iso === "N/A") return "N/A";
      const d = new Date(iso);
      return d.toUTCString().replace(" GMT", " UTC");
    }

    function renderHistory() {
      const el = document.getElementById("history");
      el.innerHTML = history.map(f =>
        `<span class="history-chip" onclick="searchFlightByCode('${f}')">${f}</span>`
      ).join("");
    }

    async function searchFlightByCode(code) {
      document.getElementById("flightInput").value = code;
      await searchFlight();
    }

    async function searchFlight() {
      const flight = document.getElementById("flightInput").value.trim().toUpperCase();
      const card = document.getElementById("card");
      const error = document.getElementById("error");
      const loading = document.getElementById("loading");

      card.style.display = "none";
      error.style.display = "none";
      loading.style.display = "block";

      if (!flight) {
        loading.style.display = "none";
        error.textContent = "Please enter a flight number.";
        error.style.display = "block";
        return;
      }

      try {
        const res = await fetch(`/flight?flight=${flight}`);
        const data = await res.json();
        loading.style.display = "none";

        if (data.error) {
          error.textContent = data.error;
          error.style.display = "block";
          return;
        }

        // Update history
        if (!history.includes(flight)) {
          history.unshift(flight);
          if (history.length > 5) history.pop();
          renderHistory();
        }

        document.getElementById("flightNumber").textContent = "Flight " + data.flight;
        document.getElementById("departure").textContent = data.departure;
        document.getElementById("arrival").textContent = data.arrival;
        document.getElementById("departureTime").textContent = "Scheduled: " + formatTime(data.departure_time);
        document.getElementById("arrivalTime").textContent = "Scheduled: " + formatTime(data.arrival_time);

        // Delay badges
        const depDelay = data.departure_delay;
        const arrDelay = data.arrival_delay;
        document.getElementById("departureDelay").innerHTML = depDelay > 0
          ? `<span class="delay">Delayed ${depDelay} min</span>`
          : `<span class="no-delay">On time</span>`;
        document.getElementById("arrivalDelay").innerHTML = arrDelay > 0
          ? `<span class="delay">Delayed ${arrDelay} min</span>`
          : `<span class="no-delay">On time</span>`;

        // Status badge
        const badge = document.getElementById("statusBadge");
        const status = data.status;
        badge.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        badge.className = "badge badge-" + status;

        card.style.display = "block";

      } catch (err) {
        loading.style.display = "none";
        error.textContent = "Something went wrong. Please try again.";
        error.style.display = "block";
      }
    }

    document.getElementById("flightInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") searchFlight();
    });
  </script>

</body>
</html>
